<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | JejakHijau</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- ICON -->
  <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="navbar-logo">Jejak<span>Hijau</span></a>
</nav>
<!-- NAVBAR END -->


<!-- LOGIN SECTION -->
<section class="login-section">
  <div class="login-container">

    <!-- LEFT -->
    <div class="login-left">
      <span>Selamat Datang</span>
      <h1>Login Ke JejakHijau 🌱</h1>
      <p>
        Masuk untuk mulai berdonasi, membuat campaign, atau mengelola sistem.</p>
    </div>

    <!-- RIGHT -->
    <div class="login-right">
      <h2>Login Account</h2>

      <div class="msg-error" id="login-error" style="display:none;">
        Pesan error dari server akan muncul di sini.
      </div>

      <div class="msg-success" id="login-success" style="display:none;">
        Login berhasil! Mengalihkan...
      </div>

       <form id="form-login">
        <div class="input-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Masukkan email" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Masukkan password" minlength="6" required>
        </div>
        <button type="submit" class="btn-auth">Login</button>
      </form>

      <div class="bottom-text">Belum punya akun?<a href="signup.html">Daftar sekarang</a></div>
    </div>

  </div>
</section>
<!-- LOGIN SECTION END -->


<!-- JS -->
<script src="main.js"></script>
<script src="validation.js"></script>

</body>
</html>
