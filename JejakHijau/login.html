<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"content="width=device-width, initial-scale=1.0">

  <title>Login | JejakHijau</title>

  <!-- FONT -->
  <link rel="preconnect"
  href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <a href="index.html" class="navbar-logo">Jejak<span>Hijau</span></a>
  <ul class="ul-navbar">

    <li><a href="index.html#beranda">BERANDA</a></li>
    <li><a href="index.html#dampak">DAMPAK</a></li>
    <li><a href="index.html#tentang">TENTANG</a></li>
    <li><a href="bantuan.html">BANTUAN</a></li>

  </ul>

  <div class="navbar-extra">
    <a href="login.html" class="active">MASUK</a>
  </div>

</nav>

<!-- LOGIN -->
<section class="login-section">
  <div class="login-container">
    <!-- LEFT -->
    <div class="login-left">
      <span>
        Selamat Datang
      </span>

      <h1>
        Login Ke
        JejakHijau 🌱
      </h1>

      <p>
        Masuk untuk mulai berdonasi,
        membuat campaign,
        atau mengelola sistem.
      </p>

      <img src="img/forest1.jpg">

    </div>

    <!-- RIGHT -->
    <div class="login-right">
      <h2>
        Login Account
      </h2>
      <form>
        <div class="input-group">

          <label>Email</label>
          <input type="email" placeholder="Masukkan email">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Masukkan password">
        </div>
        <button type="submit" class="btn-auth">Login</button>
      </form>

      <div class="bottom-text">

        Belum punya akun?
        <a href="signup.html">Daftar sekarang</a>

      </div>
    </div>
  </div>

</section>

</body>
</html>
